<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>拼读小任务 Phonics Quest</title>
<style>
:root{
  --bg:#0F1B2D; --surface:#18293F; --surface2:#22364F; --line:#2C4260;
  --ink:#F1F6FC; --dim:#8FA6C0;
  --cyan:#3BD6F2; --amber:#FFB547; --coral:#FF6E6E; --green:#5CE0A1; --violet:#9D8CFF;
  --radius:20px;
  --disp:"SF Pro Rounded",ui-rounded,"Hiragino Maru Gothic ProN","PingFang SC",system-ui,sans-serif;
  --body:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--body);overflow:hidden;
  background-image:radial-gradient(1px 1px at 20% 30%,#3a5a80 50%,transparent 51%),
  radial-gradient(1px 1px at 70% 15%,#3a5a80 50%,transparent 51%),
  radial-gradient(1.5px 1.5px at 85% 60%,#2f4a6b 50%,transparent 51%),
  radial-gradient(1px 1px at 40% 80%,#2f4a6b 50%,transparent 51%),
  radial-gradient(1px 1px at 10% 65%,#3a5a80 50%,transparent 51%);}
#app{max-width:760px;margin:0 auto;height:100%;display:flex;flex-direction:column;padding:max(16px,env(safe-area-inset-top)) 20px max(16px,env(safe-area-inset-bottom))}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 2px 14px}
.brand{font-family:var(--disp);font-weight:800;font-size:18px;letter-spacing:.5px;color:var(--cyan)}
.streak{font-family:var(--disp);font-weight:700;font-size:15px;color:var(--amber);background:var(--surface);
  border:1px solid var(--line);border-radius:999px;padding:7px 14px}
.stage{flex:1;display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px}
h1{font-family:var(--disp);font-size:26px;font-weight:800;line-height:1.25}
h2{font-family:var(--disp);font-size:20px;font-weight:800}
.sub{color:var(--dim);font-size:15px;line-height:1.6;margin-top:8px}
.btn{display:block;width:100%;border:none;cursor:pointer;font-family:var(--disp);font-weight:800;
  font-size:19px;color:#0B1524;background:var(--cyan);border-radius:18px;padding:18px;margin-top:14px;
  transition:transform .08s ease}
.btn:active{transform:scale(.96)}
.btn.ghost{background:var(--surface2);color:var(--ink);border:1px solid var(--line)}
.btn.small{width:auto;display:inline-block;font-size:15px;padding:11px 18px;margin-top:0}
.btn:focus-visible,.opt:focus-visible,.tile:focus-visible{outline:3px solid var(--amber);outline-offset:2px}
/* 星球进度地图 */
.map{display:flex;gap:10px;overflow-x:auto;padding:14px 2px;-webkit-overflow-scrolling:touch}
.node{flex:0 0 auto;min-width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--disp);font-weight:800;font-size:14px;background:var(--surface2);color:var(--dim);
  border:2px solid var(--line);flex-direction:column;line-height:1.1;padding:4px}
.node.done{background:#173A2E;border-color:var(--green);color:var(--green)}
.node.now{background:#0E2E3A;border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 0 4px rgba(59,214,242,.15)}
.node.story{border-radius:18px}
.node small{font-size:10px;font-weight:600;opacity:.8}
/* 题目区 */
.qword{font-family:var(--disp);font-weight:800;font-size:56px;text-align:center;letter-spacing:2px;margin:18px 0}
.qword .pat{color:var(--violet)}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.opt{border:1px solid var(--line);background:var(--surface2);color:var(--ink);border-radius:16px;
  font-family:var(--disp);font-weight:800;font-size:26px;padding:20px 8px;cursor:pointer;transition:transform .08s}
.opt:active{transform:scale(.95)}
.opt.right{background:#173A2E;border-color:var(--green);color:var(--green)}
.opt.wrong{background:#3A1D22;border-color:var(--coral);color:var(--coral);animation:shake .3s}
@keyframes shake{25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.speaker{display:block;margin:14px auto;width:96px;height:96px;border-radius:50%;border:2px solid var(--cyan);
  background:var(--surface2);font-size:42px;cursor:pointer;transition:transform .08s}
.speaker:active{transform:scale(.92)}
/* 拼词积木 */
.slots{display:flex;gap:8px;justify-content:center;margin:18px 0;flex-wrap:wrap}
.slot{width:52px;height:60px;border-bottom:4px solid var(--line);display:flex;align-items:center;justify-content:center;
  font-family:var(--disp);font-weight:800;font-size:34px;color:var(--cyan)}
.tiles{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.tile{width:60px;height:60px;border-radius:14px;background:var(--surface2);border:1px solid var(--line);
  font-family:var(--disp);font-weight:800;font-size:28px;color:var(--ink);cursor:pointer;transition:transform .08s}
.tile:active{transform:scale(.9)}
.tile.used{opacity:.25;pointer-events:none}
.tile.bad{animation:shake .3s;border-color:var(--coral)}
/* 教学卡 */
.patbig{font-family:var(--disp);font-weight:800;font-size:64px;text-align:center;color:var(--violet);margin:10px 0}
.exwords{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.exw{border:1px solid var(--line);background:var(--surface2);border-radius:16px;padding:16px 8px;text-align:center;
  font-family:var(--disp);font-weight:800;font-size:26px;cursor:pointer}
.exw:active{transform:scale(.95)}
.exw .pat{color:var(--violet)}
/* 进度条 & 反馈 */
.pbar{height:10px;border-radius:99px;background:var(--surface2);margin:6px 0 14px;overflow:hidden}
.pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--violet));border-radius:99px;transition:width .3s}
.combo{position:fixed;top:18%;left:50%;transform:translateX(-50%);font-family:var(--disp);font-weight:800;
  font-size:30px;color:var(--amber);pointer-events:none;opacity:0}
.combo.pop{animation:cpop .7s ease}
@keyframes cpop{0%{opacity:0;transform:translateX(-50%) scale(.6)}25%{opacity:1;transform:translateX(-50%) scale(1.15)}70%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-30px)}}
.bigtimer{font-family:var(--disp);font-weight:800;font-size:22px;color:var(--amber);text-align:center}
/* 故事阅读 */
.story{font-family:Georgia,"Times New Roman",serif;font-size:24px;line-height:2;padding:6px 2px}
.story .w{cursor:pointer;border-radius:6px;padding:1px 2px}
.story .w:active{background:var(--surface2)}
.story .w.hit{background:#173A2E;color:var(--green)}
.story .w.tgt-miss{outline:2px dashed var(--amber)}
.stitle{font-family:var(--disp);font-weight:800;font-size:22px;margin-bottom:4px}
.badge{display:inline-block;font-size:13px;font-weight:700;color:var(--violet);background:rgba(157,140,255,.12);
  border:1px solid rgba(157,140,255,.4);border-radius:999px;padding:4px 12px;margin:0 6px 10px 0}
.result-star{font-size:56px;text-align:center;margin:10px 0}
.footer-note{text-align:center;color:var(--dim);font-size:13px;padding-top:10px}
.center{text-align:center}
.mt{margin-top:16px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<script>
window.onerror=function(msg,src,line,col){
  var d=document.createElement("div");
  d.style.cssText="position:fixed;top:0;left:0;right:0;background:#B3261E;color:#fff;padding:14px;font:14px/1.5 monospace;z-index:9999;white-space:pre-wrap";
  d.textContent="⚠️ 脚本错误(截图发给 Claude):\n"+msg+"\n行 "+line+":"+col;
  document.body?document.body.appendChild(d):document.addEventListener("DOMContentLoaded",function(){document.body.appendChild(d);});
  return false;};
</script>
<noscript><div style="color:#fff;padding:30px;font-size:16px">这个页面需要 JavaScript。请在 Safari 设置中允许 JavaScript 后刷新。</div></noscript>
<div id="app"></div>
<div class="combo" id="combo"></div>
<script>
"use strict";
/* ============ 拼读单元数据(6 阶段 · 29 单元) ============ */
const UNITS=[
 {id:"u1",ph:1,pat:"a",name:"短元音 a",cn:"a 发短促的 /æ/,像被轻拍一下发出的音",words:["cat","hat","map","bag","can"]},
 {id:"u2",ph:1,pat:"e",name:"短元音 e",cn:"e 发短促的 /e/",words:["bed","pen","red","ten","leg"]},
 {id:"u3",ph:1,pat:"i",name:"短元音 i",cn:"i 发短促的 /ɪ/",words:["big","pig","sit","win","hit"]},
 {id:"u4",ph:1,pat:"o",name:"短元音 o",cn:"o 发短促的 /ɒ/,嘴张圆",words:["dog","hot","top","box","not"]},
 {id:"u5",ph:1,pat:"u",name:"短元音 u",cn:"u 发短促的 /ʌ/",words:["bus","cup","run","sun","fun"]},
 {id:"u6",ph:2,pat:"sh",name:"辅音组合 sh",cn:"s+h 合成一个音 /ʃ/,像'嘘——'",words:["ship","shop","fish","wish","shut"]},
 {id:"u7",ph:2,pat:"ch",name:"辅音组合 ch",cn:"c+h 合成 /tʃ/,像小火车'吃吃吃'",words:["chip","chat","lunch","much","rich"]},
 {id:"u8",ph:2,pat:"th",name:"辅音组合 th",cn:"舌尖轻咬,气从缝里出来",words:["this","that","math","with","thin"]},
 {id:"u9",ph:2,pat:"ck",name:"词尾 ck / ng",cn:"ck 只发一个 /k/;ng 是鼻音 /ŋ/",words:["back","kick","ring","king","song"]},
 {id:"u10",ph:2,pat:"bl",name:"开头双辅音 bl/cl/fl/pl",cn:"两个辅音连着快速读,不加元音",words:["black","club","flag","plan","flip"]},
 {id:"u11",ph:2,pat:"st",name:"开头双辅音 st/sp/sn/sw",cn:"s 打头的双辅音,s 轻轻带过",words:["stop","spin","snap","swim","star"]},
 {id:"u12",ph:3,pat:"a_e",name:"神奇 e:a_e",cn:"词尾的 e 不发音,但让前面的 a 读字母名 /eɪ/",words:["make","game","name","face","late"]},
 {id:"u13",ph:3,pat:"i_e",name:"神奇 e:i_e",cn:"词尾 e 让 i 读字母名 /aɪ/",words:["like","bike","time","nine","ride"]},
 {id:"u14",ph:3,pat:"o_e",name:"神奇 e:o_e / u_e",cn:"同一个魔法:o 读 /oʊ/,u 读 /juː/",words:["home","note","hope","cute","rule"]},
 {id:"u15",ph:4,pat:"ee",name:"元音组合 ee / ea",cn:"两个字母手拉手,发长音 /iː/",words:["see","tree","eat","team","read"]},
 {id:"u16",ph:4,pat:"ai",name:"元音组合 ai / ay",cn:"都发 /eɪ/;ai 在词中,ay 在词尾",words:["rain","wait","play","day","say"]},
 {id:"u17",ph:4,pat:"oa",name:"元音组合 oa / ow",cn:"都发 /oʊ/;ow 常在词尾",words:["boat","road","show","know","grow"]},
 {id:"u18",ph:4,pat:"oo",name:"元音组合 oo",cn:"oo 有长短两种:moon 长 /uː/,book 短 /ʊ/",words:["moon","food","book","look","good"]},
 {id:"u19",ph:4,pat:"ou",name:"元音组合 ou / ow",cn:"发 /aʊ/,像'嗷'",words:["out","loud","how","now","down"]},
 {id:"u20",ph:4,pat:"igh",name:"igh / 词尾 y",cn:"igh 里 gh 不发音,整体读 /aɪ/;词尾 y 也常读 /aɪ/",words:["night","light","right","my","fly"]},
 {id:"u21",ph:5,pat:"ar",name:"r 控元音 ar",cn:"a 被 r 拉住,读 /ɑːr/",words:["car","park","star","hard","farm"]},
 {id:"u22",ph:5,pat:"or",name:"r 控元音 or",cn:"o 被 r 拉住,读 /ɔːr/",words:["for","sport","short","corn","born"]},
 {id:"u23",ph:5,pat:"er",name:"r 控元音 er/ir/ur",cn:"三胞胎,都读 /ɜːr/",words:["her","bird","girl","turn","hurt"]},
 {id:"u24",ph:6,pat:"aw",name:"aw / all",cn:"aw 和 all 里的 a 都读 /ɔː/",words:["saw","draw","ball","tall","call"]},
 {id:"u25",ph:6,pat:"oy",name:"oi / oy",cn:"发 /ɔɪ/,像'哦咦'连读",words:["oil","coin","boy","toy","join"]},
 {id:"u26",ph:6,pat:"ce",name:"软音 c / g",cn:"c 遇到 e/i/y 读 /s/;g 常读 /dʒ/",words:["city","ice","nice","page","age"]},
 {id:"u27",ph:6,pat:"ing",name:"后缀 -ing / -ed",cn:"动词的尾巴:-ing 进行中,-ed 已完成",words:["playing","jumping","played","wanted","helping"]},
 {id:"u28",ph:6,pat:"tion",name:"后缀 -tion / -le",cn:"-tion 读 /ʃən/;词尾 -le 前的辅音跟它一组",words:["action","station","little","table","apple"]},
 {id:"u29",ph:6,pat:"syll",name:"双音节拆分",cn:"长单词切成两块,一块一块读",words:["robot","music","sunset","weekend","basket"]}
];
const PHASE_NAMES={1:"短元音",2:"辅音组合",3:"神奇 e",4:"元音组合",5:"r 控元音",6:"进阶规律"};
const DIAG_UNITS=["u1","u2","u3","u4","u5","u6","u7","u8","u9","u10","u11"]; // 诊断只测前两阶段
const ALL_WORDS=UNITS.flatMap(u=>u.words);

/* ============ 状态与存储 ============ */
const DEFAULT_P={ver:1,stage:"diagnostic",done:{},skipped:{},sessions:0,streak:0,lastDay:"",
  wordWrong:{},storyIdx:0,diagScore:null,gradScore:null,gradStep:0};
let memStore={};
let P=loadP();
function loadP(){try{const s=localStorage.getItem("phonicsQuest");return s?Object.assign({},DEFAULT_P,JSON.parse(s)):Object.assign({},DEFAULT_P);}catch(e){return Object.assign({},DEFAULT_P,memStore);}}
function saveP(){try{localStorage.setItem("phonicsQuest",JSON.stringify(P));}catch(e){memStore=JSON.parse(JSON.stringify(P));}}
function todayStr(){return new Date().toISOString().slice(0,10);}
function bumpStreak(){const t=todayStr();if(P.lastDay===t)return;
  const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
  P.streak=(P.lastDay===y)?P.streak+1:1;P.lastDay=t;saveP();}

/* ============ 发音 (Web Speech) ============ */
let VOICE=null;
function pickVoice(){const vs=speechSynthesis.getVoices();
  VOICE=vs.find(v=>v.name.includes("Samantha"))||vs.find(v=>v.lang==="en-US")||vs.find(v=>v.lang.startsWith("en"))||null;}
if("speechSynthesis" in window){pickVoice();speechSynthesis.onvoiceschanged=pickVoice;}
function say(t,rate){if(!("speechSynthesis" in window))return;
  speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);
  u.lang="en-US";if(VOICE)u.voice=VOICE;u.rate=rate||0.85;speechSynthesis.speak(u);}

/* ============ 音效 (WebAudio 小鼓垫) ============ */
let AC=null;
function beep(good){try{AC=AC||new (window.AudioContext||window.webkitAudioContext)();
  const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);
  o.type=good?"triangle":"sawtooth";o.frequency.value=good?660:180;
  g.gain.setValueAtTime(.18,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.18);
  o.start();o.stop(AC.currentTime+.2);
  if(good){const o2=AC.createOscillator(),g2=AC.createGain();o2.connect(g2);g2.connect(AC.destination);
    o2.type="triangle";o2.frequency.value=880;g2.gain.setValueAtTime(.14,AC.currentTime+.09);
    g2.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.3);o2.start(AC.currentTime+.09);o2.stop(AC.currentTime+.32);}
 }catch(e){}}
let comboN=0;
function showCombo(){comboN++;if(comboN<2)return;const c=document.getElementById("combo");
  c.textContent=comboN+" 连击!"+(comboN>=5?" 🔥":"");c.classList.remove("pop");void c.offsetWidth;c.classList.add("pop");}

/* ============ 工具 ============ */
const $=s=>document.querySelector(s);
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pick(a,n){return shuffle(a).slice(0,n);}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;");}
function hlPat(w,pat){if(!pat)return esc(w);
  if(pat.includes("_")){const[a]=pat.split("_");const i=w.indexOf(a);
    if(i>=0&&w.endsWith("e"))return esc(w.slice(0,i))+'<span class="pat">'+esc(w[i])+'</span>'+esc(w.slice(i+1,-1))+'<span class="pat">e</span>';
    return esc(w);}
  const i=w.indexOf(pat);if(i<0)return esc(w);
  return esc(w.slice(0,i))+'<span class="pat">'+esc(pat)+'</span>'+esc(w.slice(i+pat.length));}
function optionsFor(word,unit){const pool=unit?unit.words.filter(w=>w!==word):[];
  const extra=ALL_WORDS.filter(w=>w!==word&&!pool.includes(w)&&Math.abs(w.length-word.length)<=2);
  return shuffle([word].concat(pick(pool,3).concat(pick(extra,3)).slice(0,3)));}
function unitById(id){return UNITS.find(u=>u.id===id);}
function learnedUnits(){return UNITS.filter(u=>P.done[u.id]&&!P.skipped[u.id]);}
function nextUnit(){return UNITS.find(u=>!P.done[u.id]);}

/* ============ 渲染框架 ============ */
function render(html){$("#app").innerHTML=
 '<div class="topbar"><div class="brand">⚡ 拼读小任务</div><div class="streak">🔥 '+P.streak+' 天</div></div>'+
 '<div class="stage">'+html+'</div>';}

/* ============ 首页 ============ */
function home(){comboN=0;
  let mission,label;
  if(P.stage==="diagnostic"){label="第 1 天 · 摸底小侦察";mission="开始侦察 (约8分钟)";}
  else if(P.stage==="phonics"){
    if(P.gradStep>0){label="毕业闯关 "+P.gradStep+"/2";mission="开始闯关";}
    else if((P.sessions+1)%7===0){label="第 "+(P.sessions+1)+" 天 · 游戏复习日 🎮";mission="开始游戏";}
    else{const u=nextUnit();label="第 "+(P.sessions+1)+" 天 · "+(u?u.name:"复习");mission="开始今日任务 (10分钟)";}}
  else if(P.stage==="reading"){label="阅读星球 · 第 "+(P.storyIdx+1)+"/30 篇";mission="开始今日故事 (10分钟)";}
  else{label="全部完成!";mission="再玩一次终极挑战";}
  const nodes=mapNodes();
  render('<div class="card"><h1>'+label+'</h1>'+
   '<div class="sub">'+stageHint()+'</div>'+
   '<button class="btn" onclick="startSession()">'+mission+'</button>'+
   '<button class="btn ghost" onclick="say(\'Hello! Let us learn phonics!\')">🔊 试试发音</button></div>'+
   '<h2 class="mt">任务地图</h2><div class="map">'+nodes+'</div>'+
   '<div class="footer-note">每天 10 分钟 · 到点就休息 · 明天见 · v2</div>');}
function stageHint(){
  if(P.stage==="diagnostic")return "先做个小测试,你已经会的规律直接跳过,不浪费时间。";
  if(P.stage==="phonics"){const done=Object.keys(P.done).length,skip=Object.keys(P.skipped).length;
    return "已点亮 "+done+"/29 个规律"+(skip?"(其中 "+skip+" 个测试直接通过 ✨)":"")+"。";}
  if(P.stage==="reading")return "规律都学完了!现在用 30 个小故事把它们变成真本事。";
  return "拼读之旅完成 🎉 之后的拼写,交给你每天读的漫画和小说吧。";}
function mapNodes(){let h="";
  UNITS.forEach(u=>{const st=P.skipped[u.id]?"done":P.done[u.id]?"done":(P.stage==="phonics"&&nextUnit()&&nextUnit().id===u.id?"now":"");
    h+='<div class="node '+st+'">'+esc(u.pat)+'<small>'+PHASE_NAMES[u.ph]+'</small></div>';});
  for(let i=0;i<30;i++){const st=i<P.storyIdx?"done":(P.stage==="reading"&&i===P.storyIdx?"now":"");
    h+='<div class="node story '+st+'">📖<small>故事'+(i+1)+'</small></div>';}
  return h;}
function startSession(){beep(true);
  if(P.stage==="diagnostic")return diagStart();
  if(P.stage==="phonics"){
    if(P.gradStep>0)return gradStart();
    if((P.sessions+1)%7===0)return reviewDay();
    const u=nextUnit();if(!u){P.gradStep=1;saveP();return gradStart();}
    return teach(u);}
  if(P.stage==="reading")return storyStart();
  return challenge(learnedUnits(),null,()=>home(),60);}

/* ============ 通用题型 ============ */
// 听音选词
function qListen(word,unit,onDone){const opts=optionsFor(word,unit);
  render('<div class="card"><h2>听一听,选出你听到的词</h2>'+
   '<button class="speaker" onclick="say(\''+word+'\')">🔊</button>'+
   '<div class="opts">'+opts.map(o=>'<button class="opt" data-w="'+o+'">'+esc(o)+'</button>').join("")+'</div></div>');
  setTimeout(()=>say(word),350);
  document.querySelectorAll(".opt").forEach(b=>b.onclick=()=>{
    const ok=b.dataset.w===word;
    if(ok){b.classList.add("right");beep(true);showCombo();}
    else{b.classList.add("wrong");beep(false);comboN=0;P.wordWrong[word]=(P.wordWrong[word]||0)+1;saveP();
      document.querySelectorAll(".opt").forEach(x=>{if(x.dataset.w===word)x.classList.add("right");});say(word);}
    document.querySelectorAll(".opt").forEach(x=>x.onclick=null);
    setTimeout(()=>onDone(ok),ok?600:1400);});}
// 拼词积木
function qBuild(word,unit,onDone){const letters=shuffle(word.split(""));let idx=0,mistakes=0;
  render('<div class="card"><h2>听一听,把单词拼出来</h2>'+
   '<button class="speaker" onclick="say(\''+word+'\')">🔊</button>'+
   '<div class="slots">'+word.split("").map(()=>'<div class="slot"></div>').join("")+'</div>'+
   '<div class="tiles">'+letters.map((l,i)=>'<button class="tile" data-i="'+i+'" data-l="'+l+'">'+esc(l)+'</button>').join("")+'</div></div>');
  setTimeout(()=>say(word),350);
  const slots=document.querySelectorAll(".slot");
  document.querySelectorAll(".tile").forEach(t=>t.onclick=()=>{
    if(t.dataset.l===word[idx]){t.classList.add("used");slots[idx].textContent=word[idx];idx++;beep(true);
      if(idx===word.length){showCombo();say(word);
        if(mistakes>0){P.wordWrong[word]=(P.wordWrong[word]||0)+1;saveP();}
        setTimeout(()=>onDone(mistakes===0),900);}}
    else{t.classList.add("bad");beep(false);comboN=0;mistakes++;setTimeout(()=>t.classList.remove("bad"),350);}});}
// 顺序执行一串题
function runQueue(qs,after){let i=0,score=0;
  (function next(ok){if(ok===true)score++;
    if(i>=qs.length)return after(score,qs.length);
    const q=qs[i++];q(next);})();}
// 限时挑战
function challenge(units,pat,after,secs){secs=secs||60;let score=0,alive=true;const end=Date.now()+secs*1000;
  const pool=units.flatMap(u=>u.words.map(w=>({w,u})));
  function tick(){if(!alive)return;const left=Math.max(0,Math.ceil((end-Date.now())/1000));
    const el=document.getElementById("tleft");if(el)el.textContent="⏱ "+left+" 秒 · 已答对 "+score;
    if(left<=0){alive=false;finish();return;}
    setTimeout(tick,250);}
  function ask(){if(!alive)return;
    const{w,u}=pool[Math.floor(Math.random()*pool.length)];
    qListen(w,u,ok=>{if(!alive)return;if(ok)score++;ask();});
    const card=document.querySelector(".card");
    if(card)card.insertAdjacentHTML("afterbegin",'<div class="bigtimer" id="tleft"></div>');}
  function finish(){speechSynthesis.cancel();
    window.afterChallenge=()=>after(score);
    render('<div class="card center"><div class="result-star">'+(score>=10?"🏆":score>=6?"⭐️⭐️⭐️":"⭐️")+'</div>'+
     '<h1>时间到!答对 '+score+' 题</h1><div class="sub">'+(score>=10?"神速!下次能更快吗?":"很棒,明天再来刷新纪录!")+'</div>'+
     '<button class="btn" onclick="afterChallenge()">继续</button></div>');}
  ask();tick();}

function diagStart(){

   '<button class="btn" onclick="diagRun()">出发</button></div>');}
function diagRun(){const qs=[],res={};
  DIAG_UNITS.forEach(id=>{const u=unitById(id);const w=pick(u.words,1)[0];
    qs.push(next=>qListen(w,u,ok=>{res[id]=ok;next(ok);}));});
  runQueue(shuffle(qs),(score,total)=>{
    let skipped=0;DIAG_UNITS.forEach(id=>{if(res[id]){P.done[id]=true;P.skipped[id]=true;skipped++;}});
    P.diagScore=score+"/"+total;P.stage="phonics";bumpStreak();saveP();
    render('<div class="card center"><div class="result-star">✨</div>'+
     '<h1>侦察完成!</h1><div class="sub">答对 '+score+'/'+total+' 题,已有 <b>'+skipped+'</b> 个规律直接点亮跳过。<br>明天开始正式任务,每天 10 分钟。</div>'+
     '<button class="btn" onclick="home()">回到任务地图</button></div>');});}

function teach(u){
  // 第一步:2 分钟滚动复习(5 题,优先错过的词)
  const learned=learnedUnits();
  const wrongs=Object.keys(P.wordWrong).filter(w=>learned.some(u2=>u2.words.includes(w)))
    .sort((a,b)=>P.wordWrong[b]-P.wordWrong[a]);
  const revWords=wrongs.slice(0,3).concat(pick(learned.flatMap(x=>x.words),5)).slice(0,5);
  const revQs=revWords.map(w=>{const uu=UNITS.find(x=>x.words.includes(w));
    return next=>qListen(w,uu,next);});
  const doTeach=()=>{
    render('<div class="card"><div class="sub">今日新规律 · '+PHASE_NAMES[u.ph]+'</div>'+
     '<div class="patbig">'+esc(u.pat)+'</div><h2 class="center">'+esc(u.name)+'</h2>'+
     '<div class="sub center">'+esc(u.cn)+'</div>'+
     '<div class="sub center mt">点每个词听发音,注意<span style="color:var(--violet)">紫色部分</span>都是同一个音 👇</div>'+
     '<div class="exwords">'+u.words.map(w=>'<button class="exw" data-w="'+w+'">'+hlPat(w,u.pat)+'</button>').join("")+'</div>'+
     '<button class="btn" onclick="teachPractice(\''+u.id+'\')">我发现规律了,开练!</button></div>');
    document.querySelectorAll(".exw").forEach(b=>b.onclick=()=>{beep(true);say(b.dataset.w);});};
  if(revQs.length===0)return doTeach();
  render('<div class="card"><h2>先热身:复习昨天的 (5 题)</h2>'+
   '<button class="btn" onclick="teachRev(\''+u.id+'\')">开始</button></div>');
  window.teachRev=()=>runQueue(revQs,()=>doTeach());
  window._doTeach=doTeach;}
function teachPractice(uid){const u=unitById(uid);
  const ws=shuffle(u.words);
  const qs=[
    next=>qListen(ws[0],u,next),
    next=>qBuild(ws[1],u,next),
    next=>qListen(ws[2],u,next),
    next=>qBuild(ws[3],u,next),
    next=>qListen(ws[4],u,next)];
  runQueue(qs,(score,total)=>{
    render('<div class="card center"><h1>最后一关:60 秒闪电挑战 ⚡</h1>'+
     '<div class="sub">新旧单词混在一起,答对越多越好!</div>'+
     '<button class="btn" onclick="teachChal(\''+u.id+'\')">开始挑战</button></div>');});}
function teachChal(uid){const u=unitById(uid);
  const units=learnedUnits().concat([u]);
  challenge(units,null,()=>{
    P.done[u.id]=true;P.sessions++;bumpStreak();saveP();
    sessionDone("规律 <b>"+esc(u.pat)+"</b> 点亮!");});}
function sessionDone(msg){
  render('<div class="card center"><div class="result-star">🌟</div><h1>今日任务完成!</h1>'+

function gradRun(){const units=learnedUnits();
  if(P.gradStep===1){
    const ws=pick(units.flatMap(u=>u.words),12);
    runQueue(ws.map(w=>{const u=UNITS.find(x=>x.words.includes(w));return next=>qListen(w,u,next);}),
     (score,total)=>{P.gradScore=score+"/"+total;P.gradStep=2;P.sessions++;bumpStreak();saveP();
      sessionDone("第一关成绩:<b>"+score+"/"+total+"</b>(还记得第 1 天的侦察成绩吗:"+P.diagScore+")");});}
  else{const ws=pick(units.flatMap(u=>u.words).filter(w=>w.length<=5),6);
    runQueue(ws.map(w=>{const u=UNITS.find(x=>x.words.includes(w));return next=>qBuild(w,u,next);}),
     ()=>challenge(units,null,score=>{
      P.gradStep=0;P.stage="reading";P.sessions++;bumpStreak();saveP();

/* ============ 阅读星球引擎 ============ */
function matcher(pat){
  if(pat==="syll")return w=>w.length>=6;
  if(pat.includes("_")){const a=pat[0];return w=>new RegExp(a+"[bcdfghjklmnpqrstvwz]e$").test(w);}
  if(pat==="y")return w=>/[a-z]y$/.test(w)&&w.length<=4;
  if(pat==="all")return w=>w.includes("all");
  if(pat==="ce"||pat==="ci")return w=>w.includes("ce")||w.includes("ci")||w.includes("cy");
  if(pat==="ge")return w=>w.includes("ge")||w.includes("gi");
  return w=>w.includes(pat);}
function cleanWord(w){return w.toLowerCase().replace(/[^a-z]/g,"");}
function storyStart(){const s=STORIES[P.storyIdx];
  const words=s.text.split(" ");
  render('<div class="card">'+
   s.pats.map(p=>'<span class="badge">今日规律 '+esc(p)+'</span>').join("")+
   '<div class="stitle">'+esc(s.t)+'</div><div class="sub">'+esc(s.cn)+' · 点任何单词都能听发音</div>'+
   '<div class="story">'+words.map((w,i)=>'<span class="w" data-w="'+cleanWord(w)+'">'+esc(w)+'</span>').join(" ")+'</div>'+
   '<button class="btn" onclick="storyQuiz()">读完了 →</button></div>');
  document.querySelectorAll(".story .w").forEach(el=>el.onclick=()=>{if(el.dataset.w)say(el.dataset.w);});}
function storyQuiz(){const s=STORIES[P.storyIdx];
  render('<div class="card"><h2>'+esc(s.q.q)+'</h2>'+
   '<div class="opts" style="grid-template-columns:1fr">'+
   s.q.opts.map((o,i)=>'<button class="opt" style="font-size:19px" data-i="'+i+'">'+esc(o)+'</button>').join("")+'</div></div>');
  document.querySelectorAll(".opt").forEach(b=>b.onclick=()=>{
    const ok=+b.dataset.i===s.q.a;
    b.classList.add(ok?"right":"wrong");beep(ok);
    if(!ok)document.querySelectorAll(".opt").forEach(x=>{if(+x.dataset.i===s.q.a)x.classList.add("right");});
    document.querySelectorAll(".opt").forEach(x=>x.onclick=null);
    setTimeout(()=>hunter(),ok?700:1500);});}
function hunter(){const s=STORIES[P.storyIdx];
  const ms=s.pats.map(matcher);
  const words=s.text.split(" ");
  const isTgt=w=>{const c=cleanWord(w);return c&&ms.some(m=>m(c));};
  const total=new Set(words.filter(isTgt).map(cleanWord)).size;
  let found=new Set(),alive=true;const end=Date.now()+60*1000;
  render('<div class="card"><h2>规律猎人 🎯 60 秒</h2>'+
   '<div class="sub">在故事里点出所有含 <b>'+s.pats.join(" / ")+'</b> 的词!共 '+total+' 个不同的词。</div>'+
   '<div class="bigtimer" id="tleft"></div>'+
   '<div class="story" style="font-size:20px;line-height:1.9">'+
   words.map(w=>'<span class="w" data-w="'+cleanWord(w)+'">'+esc(w)+'</span>').join(" ")+'</div></div>');
  function tick(){if(!alive)return;const left=Math.max(0,Math.ceil((end-Date.now())/1000));
    const el=document.getElementById("tleft");if(el)el.textContent="⏱ "+left+" 秒 · 找到 "+found.size+"/"+total;
    if(left<=0){alive=false;return huntDone(found.size,total,false);}
    setTimeout(tick,250);}
  document.querySelectorAll(".story .w").forEach(el=>el.onclick=()=>{if(!alive)return;
    const c=el.dataset.w;if(!c)return;
    if(isTgt(c)){if(!found.has(c)){found.add(c);beep(true);showCombo();say(c,1);
        document.querySelectorAll('.story .w[data-w="'+c+'"]').forEach(x=>x.classList.add("hit"));
        if(found.size===total){alive=false;huntDone(found.size,total,true);}}}
    else{beep(false);comboN=0;}});
  tick();}
function huntDone(found,total,all){const s=STORIES[P.storyIdx];
  P.storyIdx++;P.sessions++;bumpStreak();
  const finished=P.storyIdx>=STORIES.length;
  if(finished)P.stage="done";
  saveP();
  render('<div class="card center"><div class="result-star">'+(all?"🏆":"🌟")+'</div>'+
   '<h1>'+(all?"全部找到!":("找到 "+found+"/"+total))+'</h1>'+
   '<div class="sub">故事《'+esc(s.t)+'》完成!'+(finished?
     "<br><br><b>75 天拼读之旅,全部通关!🎉</b><br>从今天起,拼写就交给你每天读的漫画和小说了。这个 App 可以光荣退休,或者随时回来玩挑战。":
     "<br>明天:第 "+(P.storyIdx+1)+" 篇故事等着你。")+'</div>'+
   '<button class="btn" onclick="home()">回到任务地图</button></div>');}

/* ============ 启动 ============ */
window.addEventListener("load",home);
</script>
